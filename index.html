<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Tech Foundation</title>
    <meta
      name="description"
      content="Open Tech Foundation — An initiative to standardize OSS libraries."
    />
    <link rel="icon" href="img/Logo.svg" type="image/svg+xml" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
        background: #111;
        color: #f5f5f5;
        -webkit-font-smoothing: antialiased;
      }

      main {
        text-align: center;
        padding: 2rem;
        max-width: 32rem;
      }

      .logo {
        width: 5rem;
        height: 5rem;
        margin: 0 auto 2rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        margin-bottom: 0.75rem;
      }

      .tagline {
        font-size: 0.95rem;
        color: #a0a0a0;
        margin-bottom: 2.5rem;
        line-height: 1.5;
      }

      .coming-soon {
        display: inline-block;
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #ff851b;
        border: 1px solid #ff851b55;
        border-radius: 999px;
        padding: 0.5rem 1.25rem;
      }
    </style>
  </head>
  <body>
    <main>
      <img class="logo" src="img/Logo.svg" alt="Open Tech Foundation logo" />
      <h1>Open Tech Foundation</h1>
      <p class="tagline">
        An initiative to standardize OSS libraries.
      </p>
      <p class="coming-soon">Coming soon</p>
    </main>
  </body>
</html>
